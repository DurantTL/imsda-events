services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: imsda_events
      POSTGRES_USER: imsda
      POSTGRES_PASSWORD: imsda_dev
    ports:
      - "5432:5432"
    volumes:
      - imsda_events_postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U imsda -d imsda_events"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  imsda_events_postgres:
