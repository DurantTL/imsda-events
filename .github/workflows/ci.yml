name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  verify:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: imsda_events
          POSTGRES_USER: imsda
          POSTGRES_PASSWORD: imsda_ci
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U imsda -d imsda_events"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      DATABASE_URL: postgresql://imsda:imsda_ci@localhost:5432/imsda_events?schema=public
      IMSDA_DEMO_SESSION: enabled
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run db:deploy
      - run: npm run db:seed
      - run: npm run verify
